<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Przelewy</title>
    <style>
        body { background: #121212; color: #ffffff; font-family: -apple-system, sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 400px; margin: auto; }
        h2 { color: #ff6200; }
        label { display: block; margin-top: 20px; color: #aaa; font-size: 0.9em; }
        input { width: 100%; padding: 15px; margin-top: 8px; background: #1e1e1e; border: 1px solid #333; color: white; border-radius: 12px; box-sizing: border-box; font-size: 1.1em; }
        button { width: 100%; padding: 15px; margin-top: 30px; background: #ff6200; border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 1em; cursor: pointer; }
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-nav">
            <h2>Nowy przelew</h2>
            <div onclick="window.location.href='index.html'" style="cursor:pointer; font-size: 24px; color: #aaa;">×</div>
        </div>
        
        <label>Numer rachunku odbiorcy (ID dokumentu)</label>
        <input type="text" id="accNumber" placeholder="Wpisz ID odbiorcy" maxlength="30">
        
        <label>Kwota (PLN)</label>
        <input type="number" id="amt" placeholder="0,00">
        
        <button onclick="zrobPrzelew()">Wyślij środki</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, doc, runTransaction, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDSiHPYoQ_buaaZOm0bb308nSQAo21fQh8",
            authDomain: "bank-ebf5e.firebaseapp.com",
            projectId: "bank-ebf5e",
            storageBucket: "bank-ebf5e.firebasestorage.app",
            messagingSenderId: "383712413192",
            appId: "1:383712413192:web:f81c9bc82431cbadd573bd"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Twoje ID konta
        const MOJE_KONTO = "11111111111111111111111111";

        window.zrobPrzelew = async function() {
            const acc = document.getElementById('accNumber').value.trim();
            const kwota = parseFloat(document.getElementById('amt').value);

            if (!acc || isNaN(kwota) || kwota <= 0) {
                alert("Wpisz poprawne dane!");
                return;
            }

            const nadawcaRef = doc(db, "konta", MOJE_KONTO);
            const odbiorcaRef = doc(db, "konta", acc);

            try {
                await runTransaction(db, async (transaction) => {
                    const nadawcaDoc = await transaction.get(nadawcaRef);
                    const odbiorcaDoc = await transaction.get(odbiorcaRef);

                    if (!nadawcaDoc.exists()) throw "Nie znaleziono Twojego konta.";
                    if (!odbiorcaDoc.exists()) throw "Nie znaleziono konta odbiorcy.";

                    const saldoNadawcy = nadawcaDoc.data().saldo;
                    const saldoOdbiorcy = odbiorcaDoc.data().saldo;

                    if (saldoNadawcy < kwota) throw "Brak wystarczających środków!";

                    // Aktualizacja sald
                    transaction.update(nadawcaRef, { saldo: saldoNadawcy - kwota });
                    transaction.update(odbiorcaRef, { saldo: saldoOdbiorcy + kwota });
                    
                    // Dodanie wpisu do historii
                    const historiaRef = collection(db, "historia");
                    transaction.set(doc(historiaRef), {
                        od: MOJE_KONTO,
                        do: acc,
                        kwota: kwota,
                        data: new Date()
                    });
                });
                
                alert("Przelew udany!");
                window.location.href = 'index.html';
            } catch (error) {
                console.error(error);
                alert("Błąd: " + error);
            }
        }
    </script>
</body>
</html>

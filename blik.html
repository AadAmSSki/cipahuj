<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Kod BLIK</title>
    <style>
        body { background: #121212; color: white; font-family: -apple-system, sans-serif; padding: 20px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        .code { font-size: 55px; color: #ff6200; font-weight: bold; letter-spacing: 5px; }
        .bar-bg { background: #333; height: 6px; margin: 20px 0; border-radius: 3px; }
        .bar-fill { background: #ff6200; height: 100%; width: 100%; transition: width 1s linear; }
    </style>
</head>
<body>
    <div style="margin-bottom: 20px;"><a href="index.html" style="color:white; text-decoration:none;">&lt;</a> Moje CasinoBank</div>
    <h2>Kod blik</h2>
    <div class="card">
        <div class="code" id="blikCode">367 124</div>
        <div class="bar-bg"><div class="bar-fill" id="progress"></div></div>
        <div id="timer">150 s</div>
    </div>
    <script>
        let timeLeft = 150;
        function update() {
            timeLeft--;
            document.getElementById('progress').style.width = (timeLeft / 150 * 100) + "%";
            document.getElementById('timer').innerText = timeLeft + " s";
            if (timeLeft <= 0) {
                timeLeft = 150;
                document.getElementById('blikCode').innerText = Math.floor(100000 + Math.random() * 900000).toString().replace(/(\d{3})(\d{3})/, '$1 $2');
            }
        }
        setInterval(update, 1000);
    </script>
</body>
</html>
